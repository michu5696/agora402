# fly.toml app configuration file generated for paycrow
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'paycrow-app'
primary_region = 'iad'

[build]

[env]
  CHAIN = 'base'
  NODE_ENV = 'production'
  PORT = '4021'

[http_service]
  internal_port = 4021
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
